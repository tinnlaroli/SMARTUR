services:
  # ============================================================
  # Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: smartur-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345678}
      POSTGRES_DB: ${DB_NAME:-smartur}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./API/bd.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-smartur}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartur-net

  # ============================================================
  # API Backend
  # ============================================================
  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: smartur-api
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-smartur}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345678}
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_USER: ${EMAIL_USER:-smarturutcv@gmail.com}
      EMAIL_PASS: ${EMAIL_PASS}
      FRONTEND_URL: http://plataforma:5173,http://landing:4321,http://localhost:5173,http://${VPS_IP:-localhost},http://${VPS_IP:-localhost}:5173,http://${VPS_IP:-localhost}:4321,https://smartur.duckdns.org,https://smartur.duckdns.org:4321
      API_URL: https://smartur.duckdns.org/api/v2
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      IMAGE_MODERATION_MODE: ${IMAGE_MODERATION_MODE:-required}
      IMAGE_MODERATION_PROVIDER: ${IMAGE_MODERATION_PROVIDER:-sightengine}
      SIGHTENGINE_API_USER: ${SIGHTENGINE_API_USER:-}
      SIGHTENGINE_API_SECRET: ${SIGHTENGINE_API_SECRET:-}
      SIGHTENGINE_NUDITY_THRESHOLD: ${SIGHTENGINE_NUDITY_THRESHOLD:-0.55}
      SIGHTENGINE_OFFENSIVE_THRESHOLD: ${SIGHTENGINE_OFFENSIVE_THRESHOLD:-0.6}
      SIGHTENGINE_SUBSTANCE_THRESHOLD: ${SIGHTENGINE_SUBSTANCE_THRESHOLD:-0.75}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      NODE_ENV: ${NODE_ENV:-production}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - smartur-net

  # ============================================================
  # ML Model Service
  # ============================================================
  modelo:
    build:
      context: ./MODELO
      dockerfile: Dockerfile
    container_name: smartur-modelo
    restart: unless-stopped
    environment:
      POI_DB_HOST: postgres
      POI_DB_PORT: 5432
      POI_DB_NAME: ${DB_NAME:-smartur}
      POI_DB_USER: ${DB_USER:-postgres}
      POI_DB_PASSWORD: ${DB_PASSWORD:-12345678}
      SKIP_MODEL_BOOT: ${SKIP_MODEL_BOOT:-0}
      AUTO_BOOTSTRAP: ${AUTO_BOOTSTRAP:-1}
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://${VPS_IP:-localhost},http://${VPS_IP:-localhost}:5173,http://${VPS_IP:-localhost}:4000,https://smartur.duckdns.org,https://smartur.duckdns.org:4321"
    volumes:
      - modelo_data:/app/data
      - modelo_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/docs", timeout=5)']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 1800s
    networks:
      - smartur-net

  # ============================================================
  # Platform (Dashboard) Frontend
  # ============================================================
  plataforma:
    build:
      context: ./PLATAFORMA
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v2
        VITE_MODELO_URL: https://smartur.duckdns.org:8000
        VITE_BUSINESS_URL: https://smartur.duckdns.org:4321/
    container_name: smartur-plataforma
    restart: unless-stopped
    environment:
      VITE_API_URL: /api/v2
      VITE_BUSINESS_URL: https://smartur.duckdns.org:4321/
      VITE_MODELO_URL: https://smartur.duckdns.org:8000
    depends_on:
      - api
    networks:
      - smartur-net

  # ============================================================
  # Landing Page Frontend
  # ============================================================
  landing:
    build:
      context: ./LANDING
      dockerfile: Dockerfile
      args:
        PUBLIC_TOURIST_APP_URL: https://smartur.duckdns.org/
        PUBLIC_API_URL: https://smartur.duckdns.org/api/v2
    container_name: smartur-landing
    restart: unless-stopped
    environment:
      PUBLIC_TOURIST_APP_URL: http://${VPS_IP:-localhost}/
    depends_on:
      - plataforma
    networks:
      - smartur-net

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: smartur-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '4321:4321'
      - '4000:4000'
      - '8000:8000'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - plataforma
      - landing
      - api
    networks:
      - smartur-net

networks:
  smartur-net:
    driver: bridge

volumes:
  postgres_data:
  modelo_data:
  modelo_models:
