  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="image.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMARTUR | Turismo con IA en las Altas Montañas, Veracruz</title>
    <meta
      name="description"
      content="SMARTUR: recomendaciones de viaje con inteligencia artificial para el turismo en las Altas Montañas de Veracruz. Rutas personalizadas, joyas ocultas y apoyo a MiPyMEs locales."
    />
    <meta property="og:title" content="SMARTUR | Turismo con IA en Veracruz" />
    <meta
      property="og:description"
      content="Descubre Veracruz con rutas personalizadas por IA: cultura, naturaleza y negocios locales verificados en la región de las Altas Montañas."
    />
    <script>
      (function() {
        try {
          var hash = window.location.hash.replace(/^#/, '');
          if (hash && hash.includes('token=')) {
            var params = new URLSearchParams(hash);
            var token = params.get('token');
            var userRaw = params.get('user');
            if (token) { localStorage.setItem('token', token); }
            if (userRaw) {
              try { localStorage.setItem('user', atob(userRaw)); } catch(e) {}
            }
            history.replaceState(null, '', window.location.pathname + window.location.search);
          }
        } catch(e) { console.warn('hash init error', e); }
      })();
    </script>
    <!-- Fonts - Vibrant Design System -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
