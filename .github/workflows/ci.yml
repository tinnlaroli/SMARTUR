name: CI — Lint, Type Check & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancela ejecuciones anteriores del mismo PR para ahorrar minutos
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # API — ESLint + Node.js syntax check
  # ─────────────────────────────────────────────────────────────
  api:
    name: API — Lint
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'API/')
    defaults:
      run:
        working-directory: API
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: API/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npx eslint . --ext .js --max-warnings 0 || true
        # "|| true" mientras no haya reglas configuradas — quitar cuando ESLint esté configurado

      - name: Unit tests (Vitest)
        run: npm test

      - name: Syntax check (Node --check)
        run: |
          find . -name "*.js" \
            -not -path "./node_modules/*" \
            -not -path "./docs/*" \
            | xargs node --check
        shell: bash

  # ─────────────────────────────────────────────────────────────
  # PLATAFORMA — TypeScript + Vite build
  # ─────────────────────────────────────────────────────────────
  plataforma:
    name: PLATAFORMA — TypeScript & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PLATAFORMA
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: PLATAFORMA/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build
        env:
          VITE_API_URL: /api/v2
          VITE_MODELO_URL: http://localhost:8000
          VITE_BUSINESS_URL: http://localhost/

  # ─────────────────────────────────────────────────────────────
  # LANDING — Astro build
  # ─────────────────────────────────────────────────────────────
  landing:
    name: LANDING — Astro Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LANDING
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: LANDING/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (astro check)
        run: npx astro check

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (Astro)
        run: npm run build
        env:
          PUBLIC_TOURIST_APP_URL: http://localhost/
          PUBLIC_API_URL: http://localhost:4000/api/v2

  # ─────────────────────────────────────────────────────────────
  # MODELO — Python syntax + imports check
  # ─────────────────────────────────────────────────────────────
  modelo:
    name: MODELO — Python Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MODELO
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: MODELO/requirements.txt

      - name: Install dependencies
        run: |
          # lightfm no tiene wheel para Python 3.11 en CI y no puede compilarse desde fuente.
          # Solo se importa dentro del lifespan que SKIP_MODEL_BOOT=1 omite en el import check.
          # El runtime Docker usa lightfm compilado correctamente con BLAS nativo.
          grep -v "^lightfm" requirements.txt | pip install --quiet -r /dev/stdin

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile src/api.py src/poi_repository.py
          echo "✓ Python syntax OK"

      - name: Import check
        run: |
          cd src
          python -c "import api; print('✓ api module importable')"
        env:
          SKIP_MODEL_BOOT: "1"
          POI_DB_HOST: localhost
          POI_DB_NAME: smartur
          POI_DB_USER: postgres
          POI_DB_PASSWORD: ""

      - name: Unit tests (pytest)
        run: python -m pytest -q
        env:
          SKIP_MODEL_BOOT: "1"
          POI_DB_HOST: localhost
          POI_DB_NAME: smartur
          POI_DB_USER: postgres
          POI_DB_PASSWORD: ""

