name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI — Lint, Type Check & Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    # Solo despliega si el CI pasó (o si se dispara manualmente)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Diagnose SSH connectivity
        run: |
          echo "=== DNS resolution ==="
          nslookup ${{ secrets.VPS_HOST }} || true
          echo "=== Port 22 reachability ==="
          nc -zv ${{ secrets.VPS_HOST }} 22 -w 10 && echo "PORT 22 OPEN" || echo "PORT 22 CLOSED/TIMEOUT"
          echo "=== Port 80 reachability ==="
          nc -zv ${{ secrets.VPS_HOST }} 80 -w 5 && echo "PORT 80 OPEN" || echo "PORT 80 CLOSED"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            cd /opt/SMARTUR

            # Asegura que estamos en main
            git checkout main 2>/dev/null || true

            # Inyecta Firebase service account desde GitHub Secret
            sed -i '/^FIREBASE_SERVICE_ACCOUNT=/d' .env
            echo "FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}" >> .env

            # Guarda cambios locales (ej: docker-compose.yml de producción)
            git stash

            # Sincroniza forzado con origin/main (evita divergencia por commits locales)
            git fetch origin
            git reset --hard origin/main

            # Restaura los cambios locales de producción
            git stash pop || true

            # Rebuild servicios de aplicación (modelo solo si su código cambió)
            docker compose -f docker-compose.yml up -d --build \
              --no-deps api plataforma landing nginx modelo

            # Limpia imágenes huérfanas
            docker image prune -f

            echo "✓ Deploy completado: $(date)"
