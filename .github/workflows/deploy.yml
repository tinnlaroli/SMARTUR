name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/SMARTUR

            # Asegura que estamos en main
            git checkout main 2>/dev/null || true

            # Guarda cambios locales (ej: docker-compose.yml de producción)
            git stash

            # Baja los últimos cambios
            git pull origin main

            # Restaura los cambios locales de producción
            git stash pop || true

            # Rebuild solo los servicios de aplicación
            docker compose -f docker-compose.yml up -d --build \
              --no-deps api plataforma landing nginx

            # Limpia imágenes huérfanas
            docker image prune -f

            echo "✓ Deploy completado: $(date)"
