name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI — Lint, Type Check & Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    # Solo despliega si el CI pasó (o si se dispara manualmente)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Diagnose SSH connectivity
        run: |
          echo "=== DNS resolution ==="
          nslookup ${{ secrets.VPS_HOST }} || true
          echo "=== Port 22 reachability ==="
          nc -zv ${{ secrets.VPS_HOST }} 22 -w 10 && echo "PORT 22 OPEN" || echo "PORT 22 CLOSED/TIMEOUT"
          echo "=== Port 80 reachability ==="
          nc -zv ${{ secrets.VPS_HOST }} 80 -w 5 && echo "PORT 80 OPEN" || echo "PORT 80 CLOSED"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            cd /opt/SMARTUR

            # Inyecta Firebase service account desde GitHub Secret (.env está en .gitignore)
            sed -i '/^FIREBASE_SERVICE_ACCOUNT=/d' .env
            echo "FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}" >> .env

            # Limpia cualquier estado de merge/stash previo y resetea al último commit
            git stash clear 2>/dev/null || true
            git fetch origin
            git reset --hard origin/main

            # Rebuild servicios de aplicación
            docker compose -f docker-compose.yml up -d --build \
              --no-deps api plataforma landing nginx modelo

            # Fuerza reload de nginx (el config es volume-mount, up -d no lo recarga solo)
            docker compose -f docker-compose.yml exec -T nginx nginx -s reload

            # Limpia imágenes huérfanas
            docker image prune -f

            # Limpia caché de build vieja (>72h) — sin esto se acumula en cada
            # deploy sin límite (llegó a 29GB/117 volúmenes huérfanos antes de
            # esta línea, con el disco al 80%). No toca imágenes/contenedores
            # activos, solo caché de capas intermedias de builds pasados.
            docker builder prune -af --filter until=72h
            docker volume prune -f

            echo "✓ Deploy completado: $(date)"
