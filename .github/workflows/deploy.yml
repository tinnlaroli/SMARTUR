name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI — Lint, Type Check & Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    # Solo despliega si el CI pasó (o si se dispara manualmente)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 30s
          command_timeout: 5m
          script: |
            set -e
            cd /opt/SMARTUR

            # Asegura que estamos en main
            git checkout main 2>/dev/null || true

            # Guarda cambios locales (ej: docker-compose.yml de producción)
            git stash

            # Baja los últimos cambios
            git pull origin main

            # Restaura los cambios locales de producción
            git stash pop || true

            # Rebuild solo los servicios de aplicación
            docker compose -f docker-compose.yml up -d --build \
              --no-deps api plataforma landing nginx

            # Limpia imágenes huérfanas
            docker image prune -f

            echo "✓ Deploy completado: $(date)"
