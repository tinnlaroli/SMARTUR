add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Docker DNS resolver — usar variable en proxy_pass obliga a re-resolver en cada request
resolver 127.0.0.11 valid=10s ipv6=off;

# PLATAFORMA — app turista + dashboard (puerto 80)
server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    location / {
        limit_req zone=general burst=20 nodelay;
        set $upstream_plataforma http://plataforma:5173;
        proxy_pass $upstream_plataforma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# LANDING — onboarding B2B (puerto 4321)
server {
    listen 4321;
    server_name _;

    location / {
        limit_req zone=general burst=20 nodelay;
        set $upstream_landing http://landing:4321;
        proxy_pass $upstream_landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}

# API — backend REST (puerto 4000)
server {
    listen 4000;
    server_name _;

    # CORS headers en todas las respuestas incluyendo errores de Nginx (503, 429, etc.)
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
            add_header 'Content-Length' '0';
            return 204;
        }

        limit_req zone=api burst=50 nodelay;
        set $upstream_api http://api:3000;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}

# MODELO — AI engine (puerto 8000)
server {
    listen 8000;
    server_name _;

    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
            add_header 'Content-Length' '0';
            return 204;
        }

        limit_req zone=api burst=20 nodelay;
        set $upstream_modelo http://modelo:8000;
        proxy_pass $upstream_modelo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}
