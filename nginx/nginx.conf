# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_status 429;

# Docker DNS resolver
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP -> HTTPS redirect for PLATAFORMA domain
server {
    listen 80;
    server_name smartur.duckdns.org;
    return 301 https://$host$request_uri;
}

# HTTPS - PLATAFORMA
server {
    listen 443 ssl http2;
    server_name smartur.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/smartur.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartur.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location ~* ^/(src|node_modules|@vite|@fs|@id)/ {
        set $upstream_plataforma http://plataforma:5173;
        proxy_pass $upstream_plataforma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        limit_req zone=general burst=20 nodelay;
        set $upstream_plataforma http://plataforma:5173;
        proxy_pass $upstream_plataforma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTP fallback - acceso directo por IP (PLATAFORMA)
server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    location ~* ^/(src|node_modules|@vite|@fs|@id)/ {
        set $upstream_plataforma http://plataforma:5173;
        proxy_pass $upstream_plataforma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        limit_req zone=general burst=20 nodelay;
        set $upstream_plataforma http://plataforma:5173;
        proxy_pass $upstream_plataforma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# LANDING
server {
    listen 4321;
    server_name _;

    location /api/v2/ {
        set $upstream_api http://api:3000;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    location ~* ^/(src|node_modules|@vite|@fs|@id|@astro)/ {
        set $upstream_landing http://landing:4321;
        proxy_pass $upstream_landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        limit_req zone=general burst=20 nodelay;
        set $upstream_landing http://landing:4321;
        proxy_pass $upstream_landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# API
server {
    listen 4000;
    server_name _;

    location / {
        limit_req zone=api burst=50 nodelay;
        set $upstream_api http://api:3000;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}

# MODELO
server {
    listen 8000;
    server_name _;

    location / {
        limit_req zone=api burst=20 nodelay;
        set $upstream_modelo http://modelo:8000;
        proxy_pass $upstream_modelo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}
