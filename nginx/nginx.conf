# Performance — gzip compression for all text responses
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
gzip_disable "msie6";

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; connect-src 'self' wss: https:; font-src 'self' data: https:; worker-src blob: 'self'; child-src blob: 'self'; frame-ancestors 'self';" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_status 429;

# Proxy timeouts — prevent hung connections from blocking workers
proxy_connect_timeout 10s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;

# Docker DNS resolver
resolver 127.0.0.11 valid=10s ipv6=off;

# ── Catch-all: IP directa o host desconocido → redirigir al dominio principal ─
server {
    listen 80 default_server;
    server_name _;
    return 301 https://smartur.online$request_uri;
}

# ── LANDING — smartur.online (puerto 80, dominio principal para SEO) ──────────
server {
    listen 80;
    server_name smartur.online www.smartur.online;

    client_max_body_size 10M;

    # API proxy para formularios de la landing (registro empresa, contacto)
    location /api/v2/ {
        set $upstream_api http://api:3000;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # Static assets with long-term caching — /_astro/ hashed by Astro
    location ~* ^/_astro/.*\.[0-9a-f]+\.(js|css)$ {
        set $upstream_landing http://landing:4321;
        proxy_pass $upstream_landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header ETag "immutable-$date_gmt" always;
    }

    # Astro dev server — assets internos sin rate limit
    location ~* ^/(_astro|@vite|@fs|@id|@astro|src|node_modules)/ {
        set $upstream_landing http://landing:4321;
        proxy_pass $upstream_landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # HTML pages — short-term caching for updates
    location ~ \.html?$ {
        limit_req zone=general burst=20 nodelay;
        set $upstream_landing http://landing:4321;
        proxy_pass $upstream_landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Images — long-term caching
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        limit_req zone=general burst=20 nodelay;
        set $upstream_landing http://landing:4321;
        proxy_pass $upstream_landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Fonts — very long-term caching
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        limit_req zone=general burst=20 nodelay;
        set $upstream_landing http://landing:4321;
        proxy_pass $upstream_landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        limit_req zone=general burst=20 nodelay;
        set $upstream_landing http://landing:4321;
        proxy_pass $upstream_landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "public, max-age=3600" always;
    }
}

# ── PLATAFORMA — app.smartur.online (puerto 80) ──────────────────────────────
server {
    listen 80;
    server_name app.smartur.online;

    client_max_body_size 10M;

    error_page 429 @rate_limited;
    error_page 502 503 504 @backend_error;

    location @rate_limited {
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Content-Type' 'application/json; charset=utf-8' always;
        return 429 '{"error":"Demasiadas solicitudes. Intenta de nuevo en unos segundos."}';
    }

    location @backend_error {
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Content-Type' 'application/json; charset=utf-8' always;
        return 503 '{"error":"Servicio temporalmente no disponible. Intenta de nuevo."}';
    }

    # API proxy para la plataforma
    location /api/v2/ {
        limit_req zone=api burst=50 nodelay;
        set $upstream_api http://api:3000;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # Static assets with long-term caching — Vite emits /assets/Name-HASH.js (alphanumeric hash)
    location ~* ^/assets/ {
        set $upstream_plataforma http://plataforma:5173;
        proxy_pass $upstream_plataforma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Vite dev server — assets internos sin rate limit
    location ~* ^/(src|node_modules|@vite|@fs|@id)/ {
        set $upstream_plataforma http://plataforma:5173;
        proxy_pass $upstream_plataforma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        limit_req zone=general burst=20 nodelay;
        set $upstream_plataforma http://plataforma:5173;
        proxy_pass $upstream_plataforma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}

