add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Docker DNS resolver — re-resuelve IPs de contenedores dinámicamente
resolver 127.0.0.11 valid=10s ipv6=off;

# PLATAFORMA — app turista + dashboard (puerto 80)
server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://plataforma:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# LANDING — onboarding B2B (puerto 4321)
server {
    listen 4321;
    server_name _;

    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://landing:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}

# API — backend REST (puerto 4000)
server {
    listen 4000;
    server_name _;

    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}

# MODELO — AI engine (puerto 8000)
server {
    listen 8000;
    server_name _;

    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://modelo:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}
